apps:
  - name: sensors-debug
    context:
      - bbc-microbit-v2
      - esp
      - heltec-wifi-lora-32-v3
      - nordic-thingy-91-x-nrf9151
      - nrf52840
      - nrf5340-app
      - nrf9160
      - rp2040
      - rp235xa
      - st-b-l475e-iot01a
      - st-nucleo-c031c6
      - st-nucleo-f042k6
      - st-nucleo-f411re
      - st-nucleo-h755zi-q
      - st-nucleo-wb55
      - st-steval-mkboxpro
      - stm32u083c-dk
    selects:
      - ?defmt-app
      - ?nrf91-modem-sensor

modules:
  - name: defmt-app
    selects:
      - defmt
    env:
      global:
        FEATURES:
          - defmt

  - name: nrf91-modem-sensor
    selects:
      - nrf91-modem
    env:
      global:
        FEATURES:
          - nrf-modem
