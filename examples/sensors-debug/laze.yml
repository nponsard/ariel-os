apps:
  - name: sensors-debug
    context:
      - bbc-microbit-v2 # No sensors currently supported, for build tests only
      - heltec-wifi-lora-32-v3 # No sensors currently supported, for build tests only
      - nordic-thingy-91-x-nrf9151
      - nrf52840dk # No sensors currently supported, for build tests only
      - nrf5340dk-app # No sensors currently supported, for build tests only
      - nrf9151-dk
      - nrf9160dk-nrf9160
      - rpi-pico # No sensors currently supported, for build tests only
      - st-b-l475e-iot01a # No sensors currently supported, for build tests only
      - st-nucleo-c031c6 # No sensors currently supported, for build tests only
      - st-nucleo-f042k6 # No sensors currently supported, for build tests only
      - st-nucleo-f411re # No sensors currently supported, for build tests only
      - st-nucleo-h755zi-q # No sensors currently supported, for build tests only
      - st-nucleo-wb55 # No sensors currently supported, for build tests only
      - st-steval-mkboxpro
      - stm32u083c-dk
    selects:
      - ?defmt-app
      - ?nrf91-modem-sensor

modules:
  - name: defmt-app
    selects:
      - defmt
    env:
      global:
        FEATURES:
          - defmt

  - name: nrf91-modem-sensor
    selects:
      - nrf91-modem
    env:
      global:
        FEATURES:
          - nrf-modem
