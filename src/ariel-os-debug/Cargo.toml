[package]
name = "ariel-os-debug"
version = "0.5.0"
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true

[package.metadata.feature-groups]
debug-channel.xor = { features = ["defmt-rtt", "rtt-target"] }
exit-implementation.xor = { features = ["semihosting", "std"] }

[package.metadata.feature-groups.features]
debug-channel.requires = { groups = ["debug-channel"] }

[dependencies]
defmt-rtt = { workspace = true, optional = true }
featurecomb = { workspace = true }
rtt-target = { workspace = true, optional = true }
semihosting = { workspace = true, optional = true }

[target.'cfg(context = "xtensa")'.dependencies]
semihosting = { workspace = true, optional = true, features = [
  "openocd-semihosting",
] }

[features]
# Enables the debug channel.
debug-channel = []

# Implementation backends for `exit()`.
semihosting = ["dep:semihosting"]
std = []

# Debug output transports.
defmt-rtt = ["dep:defmt-rtt"]
rtt-target = ["dep:rtt-target"]

[lints]
workspace = true
